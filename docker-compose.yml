services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: saas-consulenti-app
    restart: unless-stopped
    env_file:
      - .env.docker
    networks:
      - traefik-public
      - panel-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.saas-consulenti.rule=Host(`saas-consulenti.muscarivps.cloud`)"
      - "traefik.http.routers.saas-consulenti.entrypoints=websecure"
      - "traefik.http.routers.saas-consulenti.tls.certresolver=letsencrypt"
      - "traefik.http.routers.saas-consulenti.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.saas-consulenti.loadbalancer.server.port=3000"
      # Custom domain: giuseppeguglielmo.it
      - "traefik.http.routers.saas-giuseppeguglielmo-it.rule=Host(`giuseppeguglielmo.it`) || Host(`www.giuseppeguglielmo.it`)"
      - "traefik.http.routers.saas-giuseppeguglielmo-it.entrypoints=websecure"
      - "traefik.http.routers.saas-giuseppeguglielmo-it.tls.certresolver=letsencrypt"
      - "traefik.http.routers.saas-giuseppeguglielmo-it.middlewares=security-headers@file,compress@file"
      # Custom domain: giuseppeguglielmo.com
      - "traefik.http.routers.saas-giuseppeguglielmo-com.rule=Host(`giuseppeguglielmo.com`) || Host(`www.giuseppeguglielmo.com`)"
      - "traefik.http.routers.saas-giuseppeguglielmo-com.entrypoints=websecure"
      - "traefik.http.routers.saas-giuseppeguglielmo-com.tls.certresolver=letsencrypt"
      - "traefik.http.routers.saas-giuseppeguglielmo-com.middlewares=security-headers@file,compress@file"
    volumes:
      - ./data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header='Host: saas-consulenti.muscarivps.cloud' http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  traefik-public:
    external: true
  panel-internal:
    external: true
