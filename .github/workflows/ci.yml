name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          AUTH_SECRET: "ci-test-secret"
          NEXTAUTH_URL: "http://localhost:3010"
          NEXT_PUBLIC_APP_URL: "http://localhost:3010"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/projects/saas-consulenti
            git pull origin main
            docker compose build --no-cache app
            docker compose up -d app
            sleep 5
            docker compose exec app wget -q -O /dev/null --header='Host: saas-consulenti.fodivps1.cloud' http://127.0.0.1:3000/api/health || (docker compose logs app --tail 30 && exit 1)
